name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy To Production Server
    runs-on: ubuntu-latest
    environment: production
    env:
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      APP_DIR: ${{ secrets.PROD_APP_DIR }}
      PM2_APP: ${{ secrets.PROD_PM2_APP }}
    steps:
      - name: Validate deployment secrets
        id: validate
        shell: bash
        run: |
          missing=()
          [[ -n "$SERVER_SSH_KEY" ]] || missing+=("SERVER_SSH_KEY")
          [[ -n "$SERVER_HOST" ]] || missing+=("SERVER_HOST")
          [[ -n "$SERVER_USER" ]] || missing+=("SERVER_USER")
          [[ -n "$APP_DIR" ]] || missing+=("PROD_APP_DIR")
          [[ -n "$PM2_APP" ]] || missing+=("PROD_PM2_APP")

          if (( ${#missing[@]} > 0 )); then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping production deploy because required secrets are missing: ${missing[*]}"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        if: steps.validate.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        if: steps.validate.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key "${SERVER_USER}@${SERVER_HOST}" "
            set -e
            cd '${APP_DIR}'
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            test -f .env.production
            test -f server/.env.production
            grep -q '^APP_ENV=production$' server/.env.production
            npm ci
            npm run build:prod
            cd server
            npm ci
            npm run build
            APP_ENV=production NODE_ENV=production pm2 restart '${PM2_APP}' --update-env
            sudo nginx -t
            sudo systemctl reload nginx
          "
