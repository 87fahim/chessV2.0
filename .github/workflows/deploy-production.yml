name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy To Production Server
    if: ${{ secrets.SERVER_SSH_KEY != '' && secrets.SERVER_HOST != '' && secrets.SERVER_USER != '' && secrets.PROD_APP_DIR != '' && secrets.PROD_PM2_APP != '' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          APP_DIR: ${{ secrets.PROD_APP_DIR }}
          PM2_APP: ${{ secrets.PROD_PM2_APP }}
        run: |
          ssh -o StrictHostKeyChecking=no "${SERVER_USER}@${SERVER_HOST}" "
            set -e
            cd '${APP_DIR}'
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            test -f .env.production
            test -f server/.env.production
            grep -q '^APP_ENV=production$' server/.env.production
            npm ci
            npm run build:prod
            cd server
            npm ci
            npm run build
            APP_ENV=production NODE_ENV=production pm2 restart '${PM2_APP}' --update-env
            sudo nginx -t
            sudo systemctl reload nginx
          "
