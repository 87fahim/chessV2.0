name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  lint-and-build-client:
    name: Lint & Build Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  lint-and-build-server:
    name: Lint & Build Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Integration Tests
        run: npm run test:integration

  deploy:
    name: Deploy To Production Server
    needs: [lint-and-build-client, lint-and-build-server]
    runs-on: ubuntu-latest
    environment: production
    env:
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      APP_DIR: ${{ secrets.PROD_APP_DIR }}
      PM2_APP: ${{ secrets.PROD_PM2_APP }}
    steps:
      - name: Validate deployment secrets
        id: validate
        shell: bash
        run: |
          missing=()
          [[ -n "$SERVER_SSH_KEY" ]] || missing+=("SERVER_SSH_KEY")
          [[ -n "$SERVER_HOST" ]] || missing+=("SERVER_HOST")
          [[ -n "$SERVER_USER" ]] || missing+=("SERVER_USER")
          [[ -n "$APP_DIR" ]] || missing+=("PROD_APP_DIR")
          [[ -n "$PM2_APP" ]] || missing+=("PROD_PM2_APP")

          if (( ${#missing[@]} > 0 )); then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping production deploy because required secrets are missing: ${missing[*]}"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        if: steps.validate.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        if: steps.validate.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key "${SERVER_USER}@${SERVER_HOST}" <<EOF
            set -euxo pipefail

            PREVIOUS_COMMIT=""
            DEPLOY_STARTED=0

            rollback() {
              status=$?
              if [[ $status -eq 0 || $DEPLOY_STARTED -eq 0 || -z "$PREVIOUS_COMMIT" ]]; then
                exit $status
              fi

              trap - EXIT
              set +e

              echo "Deployment failed. Rolling back to $PREVIOUS_COMMIT"
              cd "${APP_DIR}" || exit $status
              git checkout main
              git reset --hard "$PREVIOUS_COMMIT"

              npm ci
              npm run build:prod

              cd server || exit $status
              npm ci
              npm run build

              APP_ENV=production NODE_ENV=production pm2 restart "${PM2_APP}" --update-env
              sudo nginx -t
              sudo systemctl reload nginx
              curl -fsS http://127.0.0.1/api/health >/dev/null

              exit $status
            }

            trap rollback EXIT

            echo "USER: \$(whoami)"
            echo "PWD before cd: \$(pwd)"
            echo "APP_DIR: ${APP_DIR}"
            echo "PM2_APP: ${PM2_APP}"

            cd "${APP_DIR}"
            pwd
            ls -la

            PREVIOUS_COMMIT=\$(git rev-parse HEAD)
            git fetch origin
            git checkout main
            DEPLOY_STARTED=1
            git pull --ff-only origin main

            echo "Checking env files..."
            test -f .env.production
            test -f server/.env.production
            grep -n '^APP_ENV=production$' server/.env.production

            echo "Client install/build..."
            npm ci
            npm run build:prod

            echo "Server install/build..."
            cd server
            pwd
            npm ci
            npm run build

            echo "Restarting PM2..."
            APP_ENV=production NODE_ENV=production pm2 restart "${PM2_APP}" --update-env

            echo "Testing nginx..."
            sudo nginx -t
            sudo systemctl reload nginx

            echo "Running smoke checks..."
            curl -fsS http://127.0.0.1/api/health >/dev/null
            curl -fsSI http://127.0.0.1 >/dev/null

            trap - EXIT
          EOF
