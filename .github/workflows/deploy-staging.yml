name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches: [staging]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  lint-and-build-client:
    name: Lint & Build Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          package-manager-cache: false

      - name: Update npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Integration Tests
        run: npm run test:integration

  lint-and-build-server:
    name: Lint & Build Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy To Staging Server
    needs: [lint-and-build-client, lint-and-build-server]
    runs-on: ubuntu-latest
    environment: staging
    env:
      SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      APP_DIR: ${{ secrets.STAGING_APP_DIR }}
      PM2_APP: ${{ secrets.STAGING_PM2_APP }}
    steps:
      - name: Validate deployment secrets
        id: validate
        shell: bash
        run: |
          missing=()
          [[ -n "$SERVER_SSH_KEY" ]] || missing+=("SERVER_SSH_KEY")
          [[ -n "$SERVER_HOST" ]] || missing+=("SERVER_HOST")
          [[ -n "$SERVER_USER" ]] || missing+=("SERVER_USER")
          [[ -n "$APP_DIR" ]] || missing+=("STAGING_APP_DIR")
          [[ -n "$PM2_APP" ]] || missing+=("STAGING_PM2_APP")

          if (( ${#missing[@]} > 0 )); then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping staging deploy because required secrets are missing: ${missing[*]}"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Setup SSH key
        if: steps.validate.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        if: steps.validate.outputs.ready == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key "${SERVER_USER}@${SERVER_HOST}" "
            set -e
            cd '${APP_DIR}'
            git fetch origin
            git checkout staging
            git pull --ff-only origin staging
            test -f .env.staging
            test -f server/.env.staging
            grep -q '^APP_ENV=staging$' server/.env.staging
            npm ci
            npm run build:staging
            cd server
            npm ci
            npm run build
            APP_ENV=staging NODE_ENV=production pm2 restart '${PM2_APP}' --update-env
            sudo nginx -t
            sudo systemctl reload nginx
          "
