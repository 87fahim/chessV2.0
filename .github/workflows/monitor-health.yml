name: Monitor Health

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    name: Monitor ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: staging
            max_latency_ms: 2500
          - environment: production
            max_latency_ms: 1500
    environment: ${{ matrix.environment }}
    env:
      HEALTHCHECK_URL: ${{ secrets.MONITOR_HEALTH_URL }}
      ALERT_WEBHOOK_URL: ${{ secrets.MONITOR_SLACK_WEBHOOK }}
      TARGET_ENVIRONMENT: ${{ matrix.environment }}
      MAX_LATENCY_MS: ${{ matrix.max_latency_ms }}
    steps:
      - name: Validate monitoring secrets
        id: validate
        shell: bash
        run: |
          missing=()
          [[ -n "$HEALTHCHECK_URL" ]] || missing+=("MONITOR_HEALTH_URL")

          if (( ${#missing[@]} > 0 )); then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${TARGET_ENVIRONMENT} health monitor because required secrets are missing: ${missing[*]}"
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Probe health endpoint
        if: steps.validate.outputs.ready == 'true'
        id: probe
        shell: bash
        run: |
          set -euo pipefail

          response_file="$(mktemp)"

          if ! curl_output=$(curl -sS -o "$response_file" -w '%{http_code} %{time_total}' "$HEALTHCHECK_URL"); then
            echo "status=network_error" >> "$GITHUB_OUTPUT"
            echo "http_code=000" >> "$GITHUB_OUTPUT"
            echo "latency_ms=0" >> "$GITHUB_OUTPUT"
            {
              echo "response_body<<EOF"
              cat "$response_file" || true
              echo
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 1
          fi

          http_code=$(awk '{print $1}' <<< "$curl_output")
          time_total=$(awk '{print $2}' <<< "$curl_output")
          latency_ms=$(awk -v value="$time_total" 'BEGIN { printf "%d", value * 1000 }')

          echo "http_code=$http_code" >> "$GITHUB_OUTPUT"
          echo "latency_ms=$latency_ms" >> "$GITHUB_OUTPUT"
          {
            echo "response_body<<EOF"
            cat "$response_file"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [[ "$http_code" != "200" ]]; then
            echo "status=http_error" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if (( latency_ms > MAX_LATENCY_MS )); then
            echo "status=latency_exceeded" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "status=ok" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: failure() && steps.validate.outputs.ready == 'true' && env.ALERT_WEBHOOK_URL != ''
        shell: bash
        env:
          ALERT_MESSAGE: >-
            [${{ matrix.environment }}] health check failed
            status=${{ steps.probe.outputs.status }}
            http=${{ steps.probe.outputs.http_code }}
            latency_ms=${{ steps.probe.outputs.latency_ms }}
            threshold_ms=${{ matrix.max_latency_ms }}
            url=${{ secrets.MONITOR_HEALTH_URL }}
            run=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload=$(node -e "process.stdout.write(JSON.stringify({ text: process.env.ALERT_MESSAGE }))")
          curl -sS -X POST \
            -H 'Content-type: application/json' \
            --data "$payload" \
            "$ALERT_WEBHOOK_URL"